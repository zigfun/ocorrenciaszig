<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocorrências — ZIG Funtech</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4fb;--surface:#fff;--s2:#eaf0fb;--s3:#dce8f7;--border:#c8d9f0;--accent:#1a5fd4;--text:#0f1f3d;--muted:#6b85aa;--danger:#e03e3e;--ok:#0d8a60}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{font-size:15px;font-weight:800;color:var(--accent);padding:18px 16px 16px;border-bottom:1px solid var(--border)}
.sb-logo span{color:var(--muted);font-weight:500;font-size:10px;display:block;margin-top:2px;text-transform:uppercase;letter-spacing:.1em}
.nav-sec{padding:12px 8px 4px}
.nav-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .12s;position:relative}
.nav-item:hover,.nav-item.on{background:var(--s2);color:var(--text)}
.nav-item.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-badge{margin-left:auto;background:var(--s3);font-size:10px;font-weight:600;color:var(--muted);padding:1px 6px;border-radius:9px}
.nav-item.on .nav-badge{background:var(--accent);color:#fff}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);line-height:1.6}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:800;flex:1}
.topbar-title span{color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:7px 13px;border:none;border-radius:7px;cursor:pointer;white-space:nowrap}
.btn-p:hover{background:#1450b8}
.btn-o{background:transparent;color:var(--muted);font-size:12px;font-weight:500;padding:7px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;white-space:nowrap}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:7px 13px;border-radius:7px;cursor:pointer}
.filters{padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.fsel{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 8px;border-radius:6px;outline:none}
.content{flex:1;overflow-y:auto;padding:20px}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.kpi-val{font-size:28px;font-weight:800;margin:4px 0 2px}
.kpi-sub{font-size:10px;color:var(--muted)}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:700}
.sec-line{flex:1;height:1px;background:var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:22px}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .12s}
.icard:hover{border-color:var(--accent);transform:translateY(-1px)}
.icard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.icard-client{font-weight:700;font-size:13px}
.icard-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.cat-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.st-a{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(234,153,0,.12);color:#b36a00;border:1px solid rgba(234,153,0,.3)}
.st-r{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(13,138,96,.12);color:#0d8a60;border:1px solid rgba(13,138,96,.3)}
.icard-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;font-size:10px;color:var(--muted)}
.icard-desc{font-size:11px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.kanban{display:flex;gap:14px;padding:20px;overflow-x:auto;align-items:flex-start;flex:1}
.kb-col{flex:0 0 290px;background:var(--s2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 170px)}
.kb-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.kb-title{font-size:12px;font-weight:700;flex:1}
.kb-count{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px}
.kb-cards{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.kb-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .12s}
.kb-card:hover{border-color:var(--accent)}
.kb-client{font-weight:700;font-size:12px;margin-bottom:5px}
.kb-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;font-size:10px;color:var(--muted)}
.kb-desc{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.kb-move{font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--s2);color:var(--muted);cursor:pointer}
.kb-move:hover{border-color:var(--accent);color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:6px}
.det-tags{display:flex;gap:6px;margin-top:6px;margin-bottom:14px;flex-wrap:wrap}
.det-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.det-pill{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted)}
.det-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.det-desc{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.factions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.sync-ok{font-size:10px;color:var(--ok);padding:4px 10px;background:rgba(13,138,96,.08);border:1px solid rgba(13,138,96,.25);border-radius:20px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#c8d9f0;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ===================== CONFIGURAÇÃO =====================
const BIN_URL = "https://api.jsonbin.io/v3/b/69fa1c0a856a682189acd9a2/latest";
const BIN_KEY = "$2a$10$qNAPL3qG9Q6ecS4yKo7Sm.IFi2M/meue8astJrVZZOD.rm.iGBUm.";
// ========================================================

const PAL = [
  {c:"#1a5fd4",bg:"rgba(26,95,212,.12)"},{c:"#0d8a60",bg:"rgba(13,138,96,.12)"},
  {c:"#7c3aed",bg:"rgba(124,58,237,.12)"},{c:"#b36a00",bg:"rgba(180,106,0,.12)"},
  {c:"#c43a8a",bg:"rgba(196,58,138,.12)"},{c:"#c4621a",bg:"rgba(196,98,26,.12)"},
];
const gc = (a,as) => PAL[Math.max(0,as.indexOf(a))%PAL.length];

function ns(s){
  if(!s) return "andamento";
  const l=s.toLowerCase();
  return (l.includes("conclu")||l.includes("resolv"))?"resolvido":"andamento";
}

function pdb(d){
  if(!d) return null;
  const [dd,mm,yyyy]=d.split("/");
  return yyyy&&mm&&dd?new Date(`${yyyy}-${mm}-${dd}`):null;
}

function pRows(rows){
  return rows.filter(r=>r["Cliente"]||r["Descrição"]).map((r,i)=>({
    id:`${i}_${Date.now()}`,
    client:r["Cliente"]||"", date:r["Data da ocorrência"]||"",
    am:r["AM responsável"]||"", coord:r["Time"]||r["Coordenação"]||"",
    area:r["Área"]||"Geral", status:ns(r["Status"]),
    desc:r["Descrição"]||"", score:r["Pontuação"]||"",
    link:r["Prints/Audios/PDFs"]||r["Prints/ Audios/ PDFs"]||"",
    ts:r["Hora de início"]||r["Carimbo de data/hora"]||"",
  }));
}

function App(){
  const [data,setData]=useState([]);
  const [view,setView]=useState("list");
  const [tab,setTab]=useState("all");
  const [fAM,setFAM]=useState("");
  const [fSt,setFSt]=useState("");
  const [fCo,setFCo]=useState("");
  const [fDf,setFDf]=useState("");
  const [fDt,setFDt]=useState("");
  const [vi,setVi]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [err,setErr]=useState("");
  const fRef=useRef();
  const iRef=useRef();

  const sync=useCallback(async()=>{
    setSyncing(true);setErr("");
    try{
      const r=await fetch(BIN_URL,{headers:{"X-Master-Key":BIN_KEY}});
      if(!r.ok) throw new Error("Erro "+r.status);
      const j=await r.json();
      const rows=j.record||j;
      if(!Array.isArray(rows)) throw new Error("Formato inválido");
      setData(pRows(rows));
      setLastSync(new Date());
    }catch(e){setErr(e.message);}
    finally{setSyncing(false);}
  },[]);

  useEffect(()=>{sync();},[]);
  useEffect(()=>{
    clearInterval(iRef.current);
    if(lastSync) iRef.current=setInterval(sync,60000);
    return()=>clearInterval(iRef.current);
  },[lastSync,sync]);

  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      const r=Papa.parse(ev.target.result.trim(),{header:true,skipEmptyLines:true});
      setData(pRows(r.data));setLastSync(new Date());
    };
    rd.readAsText(f,"UTF-8");e.target.value="";
  };

  const toggleSt=id=>setData(p=>p.map(r=>r.id===id?{...r,status:r.status==="andamento"?"resolvido":"andamento"}:r));

  const areas=[...new Set(data.map(r=>r.area).filter(Boolean))];
  const ams=[...new Set(data.map(r=>r.am).filter(Boolean))];
  const coords=[...new Set(data.map(r=>r.coord).filter(Boolean))];

  const fil=data.filter(r=>{
    if(tab!=="all"&&r.area!==tab)return false;
    if(fAM&&r.am!==fAM)return false;
    if(fSt&&r.status!==fSt)return false;
    if(fCo&&r.coord!==fCo)return false;
    if(fDf){const d=pdb(r.date);if(!d||d<new Date(fDf))return false;}
    if(fDt){const d=pdb(r.date);if(!d||d>new Date(fDt))return false;}
    return true;
  });

  const tot=data.length;
  const kA=data.filter(r=>r.status==="andamento").length;
  const kR=data.filter(r=>r.status==="resolvido").length;
  const anyF=fAM||fSt||fCo||fDf||fDt;

  return(
    <div className="app">
      <aside className="sb">
        <div className="sb-logo">OCORRÊNCIAS<span>ZIG Funtech</span></div>
        <div className="nav-sec">
          <div className="nav-lbl">Visão</div>
          <div className={"nav-item"+(view==="list"&&tab==="all"?" on":"")} onClick={()=>{setView("list");setTab("all");}}>
            ⊞ Todas <span className="nav-badge">{tot}</span>
          </div>
          <div className={"nav-item"+(view==="kanban"?" on":"")} onClick={()=>setView("kanban")}>
            🗂 Kanban <span className="nav-badge">{kA}</span>
          </div>
        </div>
        <div className="nav-sec">
          <div className="nav-lbl">Áreas</div>
          {areas.map(a=>{
            const ac=gc(a,areas);
            return(
              <div key={a} className={"nav-item"+(view==="list"&&tab===a?" on":"")} onClick={()=>{setView("list");setTab(a);}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:ac.c,flexShrink:0}}/>
                <span style={{flex:1,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a}</span>
                <span className="nav-badge">{data.filter(r=>r.area===a).length}</span>
              </div>
            );
          })}
        </div>
        <div className="sb-foot">
          <p>ZIG Funtech · {new Date().getFullYear()}</p>
          {lastSync&&<p>Atualizado {lastSync.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</p>}
          {lastSync&&<p style={{color:"#0d8a60"}}>● Sync ativo (1 min)</p>}
          {syncing&&<p style={{color:"var(--accent)"}}>⟳ Sincronizando...</p>}
          {err&&<p style={{color:"var(--danger)"}}>⚠ {err}</p>}
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div className="topbar-title">
            {view==="kanban"?<span>Kanban de <span>Status</span></span>
             :tab==="all"?<span>Todas as <span>Ocorrências</span></span>
             :<span style={{color:"var(--accent)"}}>{tab}</span>}
          </div>
          {lastSync&&<span className="sync-ok">✓ {lastSync.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span>}
          <button className="btn-o" onClick={sync} disabled={syncing}>{syncing?"...":"🔄 Atualizar"}</button>
          <button className="btn-o" onClick={()=>fRef.current.click()}>↑ CSV</button>
          <input ref={fRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
        </div>

        <div className="filters">
          <span style={{fontSize:11,color:"var(--muted)",fontWeight:500}}>Filtrar:</span>
          <select className="fsel" value={fAM} onChange={e=>setFAM(e.target.value)}>
            <option value="">Todos os AMs</option>
            {ams.map(a=><option key={a}>{a}</option>)}
          </select>
          <select className="fsel" value={fCo} onChange={e=>setFCo(e.target.value)}>
            <option value="">Todas as coordenações</option>
            {coords.map(c=><option key={c}>{c}</option>)}
          </select>
          <select className="fsel" value={fSt} onChange={e=>setFSt(e.target.value)}>
            <option value="">Todos os status</option>
            <option value="andamento">Em andamento</option>
            <option value="resolvido">Resolvido</option>
          </select>
          <span style={{fontSize:11,color:"var(--muted)"}}>De:</span>
          <input type="date" className="fsel" value={fDf} onChange={e=>setFDf(e.target.value)}/>
          <span style={{fontSize:11,color:"var(--muted)"}}>Até:</span>
          <input type="date" className="fsel" value={fDt} onChange={e=>setFDt(e.target.value)}/>
          {anyF&&<span style={{fontSize:11,color:"var(--accent)",cursor:"pointer"}} onClick={()=>{setFAM("");setFSt("");setFCo("");setFDf("");setFDt("");}}>✕ Limpar</span>}
          <span style={{marginLeft:"auto",fontSize:11,color:"var(--muted)"}}>{fil.length} registro{fil.length!==1?"s":""}</span>
        </div>

        {view==="kanban"?(
          <div className="kanban">
            {[
              {key:"andamento",label:"Em andamento",emoji:"🔄",c:"#b36a00",bg:"rgba(234,153,0,.12)",bd:"rgba(234,153,0,.3)"},
              {key:"resolvido",label:"Resolvido",emoji:"✅",c:"#0d8a60",bg:"rgba(13,138,96,.12)",bd:"rgba(13,138,96,.3)"},
            ].map(col=>{
              const items=fil.filter(r=>r.status===col.key);
              return(
                <div className="kb-col" key={col.key}>
                  <div className="kb-head">
                    <span className="kb-title" style={{color:col.c}}>{col.emoji} {col.label}</span>
                    <span className="kb-count" style={{background:col.bg,color:col.c,border:"1px solid "+col.bd}}>{items.length}</span>
                  </div>
                  <div className="kb-cards">
                    {items.length===0&&<div style={{textAlign:"center",padding:"24px 0",fontSize:11,color:"var(--muted)"}}>Nenhuma</div>}
                    {items.map(inc=>{
                      const ac=gc(inc.area,areas);
                      return(
                        <div className="kb-card" key={inc.id} onClick={()=>setVi(inc)}>
                          <div className="kb-client">{inc.client}</div>
                          <div className="kb-meta">
                            <span className="cat-tag" style={{background:ac.bg,color:ac.c}}>{inc.area}</span>
                            {inc.date&&<span>📅 {inc.date}</span>}
                            {inc.am&&<span>👤 {inc.am}</span>}
                          </div>
                          {inc.desc&&<div className="kb-desc">{inc.desc}</div>}
                          <button className="kb-move" onClick={e=>{e.stopPropagation();toggleSt(inc.id);}}>
                            {inc.status==="andamento"?"✅ Resolver":"🔄 Reabrir"}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        ):(
          <div className="content">
            <div className="kpi-row">
              <div className="kpi"><div className="kpi-lbl">Total</div><div className="kpi-val" style={{color:"var(--accent)"}}>{tot}</div><div className="kpi-sub">registros</div></div>
              <div className="kpi"><div className="kpi-lbl">Em andamento</div><div className="kpi-val" style={{color:"#b36a00"}}>{kA}</div><div className="kpi-sub">abertas</div></div>
              <div className="kpi"><div className="kpi-lbl">Resolvidas</div><div className="kpi-val" style={{color:"var(--ok)"}}>{kR}</div><div className="kpi-sub">encerradas</div></div>
            </div>
            {data.length===0?(
              <div className="empty">
                <div style={{fontSize:36,marginBottom:12}}>{syncing?"⟳":"📋"}</div>
                <div style={{fontSize:13}}>{syncing?"Carregando dados...":"Nenhum dado carregado."}</div>
              </div>
            ):tab==="all"?(
              areas.map(area=>{
                const items=fil.filter(r=>r.area===area);
                if(!items.length&&anyF)return null;
                const ac=gc(area,areas);
                return(
                  <div key={area}>
                    <div className="sec-hd">
                      <span style={{width:8,height:8,borderRadius:"50%",background:ac.c,display:"inline-block",flexShrink:0}}/>
                      <span className="sec-title">{area}</span>
                      <div className="sec-line"/>
                      <span style={{fontSize:11,color:"var(--muted)"}}>{items.length}</span>
                    </div>
                    {items.length===0?<p style={{fontSize:12,color:"var(--muted)",marginBottom:20}}>Nenhuma.</p>
                    :<div className="cards-grid">{items.map(inc=><Card key={inc.id} inc={inc} areas={areas} onView={setVi}/>)}</div>}
                  </div>
                );
              })
            ):(
              <div className="cards-grid">{fil.map(inc=><Card key={inc.id} inc={inc} areas={areas} onView={setVi}/>)}</div>
            )}
          </div>
        )}
      </main>

      {vi&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setVi(null)}>
          <div className="modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div className="modal-title">{vi.client}</div>
              <button className="btn-g" onClick={()=>setVi(null)} style={{padding:"4px 10px",fontSize:16}}>×</button>
            </div>
            <div className="det-tags">
              <span className={vi.status==="resolvido"?"st-r":"st-a"}>{vi.status==="resolvido"?"✅ Resolvido":"🔄 Em andamento"}</span>
              <span className="cat-tag" style={{background:gc(vi.area,areas).bg,color:gc(vi.area,areas).c}}>{vi.area}</span>
            </div>
            <div className="det-meta">
              {vi.date&&<span className="det-pill">📅 {vi.date}</span>}
              {vi.am&&<span className="det-pill">👤 {vi.am}</span>}
              {vi.coord&&<span className="det-pill">🏢 {vi.coord}</span>}
              {vi.score&&<span className="det-pill">⭐ {vi.score}</span>}
              {vi.ts&&<span className="det-pill">🕐 {vi.ts}</span>}
            </div>
            {vi.desc&&<div style={{marginBottom:14}}><div className="det-lbl">Descrição</div><div className="det-desc">{vi.desc}</div></div>}
            {vi.link&&<div style={{marginBottom:14}}><div className="det-lbl">Anexos</div>
              <a href="https://zigpay-my.sharepoint.com/my?id=%2Fpersonal%2Ftalita%5Ffernandes%5Fzig%5Ffun%2FDocuments%2FApps%2FMicrosoft%20Forms%2FFormul%C3%A1rio%20de%20registro%20de%20volunt%C3%A1rios%20da%20comunidad" target="_blank" rel="noopener noreferrer"
                style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:"var(--accent)",background:"rgba(26,95,212,.08)",border:"1px solid rgba(26,95,212,.2)",padding:"6px 12px",borderRadius:7,textDecoration:"none",fontWeight:500}}>
                📁 Ver anexos no SharePoint
              </a>
            </div>}
            <div className="factions">
              <button className="btn-g" onClick={()=>{toggleSt(vi.id);setVi(p=>({...p,status:p.status==="andamento"?"resolvido":"andamento"}));}}>
                {vi.status==="andamento"?"✅ Marcar resolvido":"🔄 Reabrir"}
              </button>
              <button className="btn-g" onClick={()=>setVi(null)}>Fechar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Card({inc,areas,onView}){
  const ac=gc(inc.area,areas);
  return(
    <div className="icard" onClick={()=>onView(inc)}>
      <div className="icard-top">
        <div className="icard-client">{inc.client}</div>
        <div className="icard-tags">
          <span className={inc.status==="resolvido"?"st-r":"st-a"}>{inc.status==="resolvido"?"✅ Resolvido":"🔄 Andamento"}</span>
          <span className="cat-tag" style={{background:ac.bg,color:ac.c}}>{inc.area}</span>
        </div>
      </div>
      <div className="icard-meta">
        {inc.date&&<span>📅 {inc.date}</span>}
        {inc.am&&<span>👤 {inc.am}</span>}
        {inc.coord&&<span>🏢 {inc.coord}</span>}
      </div>
      {inc.desc&&<div className="icard-desc">{inc.desc}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
